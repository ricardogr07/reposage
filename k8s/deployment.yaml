apiVersion: apps/v1
kind: Deployment
metadata:
  name: reposage-server
  labels:
    app: reposage-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reposage-server
  template:
    metadata:
      labels:
        app: reposage-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: reposage-server
          image: REGISTRY_PLACEHOLDER/reposage-server:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            # Optional: remove if AI enrichment is not used
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: reposage-secrets
                  key: anthropic-api-key
                  optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
