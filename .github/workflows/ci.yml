name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toxenv: [lint, type, py312, pkg, linecount]
    name: ${{ matrix.toxenv }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Run tox
        run: tox -e ${{ matrix.toxenv }}

  selfaudit:
    name: selfaudit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository (full history)
        uses: actions/checkout@v4
        with:
          # The self-audit reads real git history: commit-count and
          # history-secret checks are meaningless on a shallow clone.
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Grade RepoSage against its own Six Standards
        run: tox -e selfaudit

