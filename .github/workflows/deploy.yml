name: Deploy to GKE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for Workload Identity Federation

env:
  REGION: us-central1
  CLUSTER_NAME: reposage-dev

jobs:
  build-and-deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          IMAGE="${{ secrets.GCP_REGISTRY_URL }}/reposage-server"
          docker build -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" .

      - name: Push Docker image
        run: |
          IMAGE="${{ secrets.GCP_REGISTRY_URL }}/reposage-server"
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Update image tag in deployment
        run: |
          IMAGE="${{ secrets.GCP_REGISTRY_URL }}/reposage-server:${{ github.sha }}"
          kubectl set image deployment/reposage-server reposage-server="${IMAGE}"

      - name: Apply manifests (first deploy or schema changes)
        run: kubectl apply -f k8s/

      - name: Wait for rollout
        run: kubectl rollout status deployment/reposage-server --timeout=120s
