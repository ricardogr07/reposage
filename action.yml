name: RepoSage Audit
description: Run a deterministic repository audit with optional AI enrichment.
author: RepoSage contributors

branding:
  icon: search
  color: blue

inputs:
  path:
    description: Path to the repository root to audit.
    default: .
  format:
    description: Output format — markdown or json.
    default: markdown
  output:
    description: File path to write the report. Defaults to reposage-report.md.
    default: reposage-report.md
  enrich:
    description: >
      Enable AI enrichment (module roles, debt items, top-5 improvements).
      Requires anthropic-api-key and installs reposage[ai].
    default: "false"
  anthropic-api-key:
    description: Anthropic API key. Required when enrich is true.
    required: false
  version:
    description: RepoSage version to install (e.g. "0.2.0"). Defaults to latest.
    default: ""
  mode:
    description: report or audit
    default: report
  fail-under:
    description: >
      Six Standards audit mode only: exit non-zero when the grade is below this
      value (0-6).
    default: "0"
  run-subprocess-checks:
    description: >
      Six Standards audit mode only: allow checks that shell out (pytest,
      dependency install) to run.
    default: "false"

outputs:
  report-path:
    description: Path to the generated report file.
    value: ${{ steps.run-audit.outputs.report-path }}

runs:
  using: composite
  steps:
    - name: Install RepoSage
      shell: bash
      run: |
        VERSION_SPEC=""
        if [ -n "${{ inputs.version }}" ]; then
          VERSION_SPEC="==${{ inputs.version }}"
        fi
        if [ "${{ inputs.enrich }}" = "true" ]; then
          pip install "reposage[ai]${VERSION_SPEC}"
        else
          pip install "reposage${VERSION_SPEC}"
        fi

    - name: Run audit
      id: run-audit
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        INPUT_PATH: ${{ inputs.path }}
        FAIL_UNDER: ${{ inputs.fail-under }}
      run: |
        if [ "${{ inputs.mode }}" = "audit" ]; then
          SUBPROC_FLAG=""
          if [ "${{ inputs.run-subprocess-checks }}" = "true" ]; then
            SUBPROC_FLAG="--run-subprocess-checks"
          fi
          reposage audit "$INPUT_PATH" \
            --format github \
            --fail-under "$FAIL_UNDER" \
            $SUBPROC_FLAG
        else
          ENRICH_FLAG=""
          if [ "${{ inputs.enrich }}" = "true" ]; then
            ENRICH_FLAG="--enrich"
          fi
          reposage report "$INPUT_PATH" \
            --format "${{ inputs.format }}" \
            --output "${{ inputs.output }}" \
            $ENRICH_FLAG
          echo "report-path=${{ inputs.output }}" >> "$GITHUB_OUTPUT"
        fi
