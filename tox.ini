[tox]
env_list = py312, lint, type, pkg
skip_missing_interpreters = true
isolated_build = true

[testenv]
description = Run the test suite
package = wheel
wheel_build_env = .pkg
basepython = {env:TOX_PYTHON:python}
set_env =
    TMP = {tox_root}{/}.tmp
    TEMP = {tox_root}{/}.tmp
    TMPDIR = {tox_root}{/}.tmp
deps =
    pytest>=8.3
    pytest-cov>=6.0
commands = python -m pytest {posargs}

[testenv:py312]
basepython = py312

[testenv:lint]
description = Run lint and formatting checks
package = skip
deps = ruff>=0.11
commands =
    python -m ruff check src tests
    python -m ruff format --check src tests

[testenv:type]
description = Run static type checks
deps = mypy>=1.11
commands = python -m mypy src

[testenv:pkg]
description = Build distributable artifacts
package = skip
deps = build>=1.2
    hatchling>=1.26
commands = python -m build --sdist --wheel --outdir dist --no-isolation

[testenv:ai]
description = Run enrichment tests with the optional AI extras installed
package = wheel
wheel_build_env = .pkg
basepython = {env:TOX_PYTHON:python}
extras = ai
deps =
    pytest>=8.3
    pytest-cov>=6.0
commands = python -m pytest tests/test_enrichment.py {posargs}

[testenv:server]
description = Run MCP server tests with the optional server extras installed
package = wheel
wheel_build_env = .pkg
basepython = {env:TOX_PYTHON:python}
extras = server
deps =
    pytest>=8.3
    pytest-cov>=6.0
    httpx>=0.27
commands = python -m pytest tests/test_server.py {posargs}
